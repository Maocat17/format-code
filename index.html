<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡程式碼美化器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.7/beautify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.7/beautify-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.7/beautify-html.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f5f7f9;
            --editor-bg: #282c34;
            --text-color: #abb2bf;
            --line-num-bg: #1e2227;
            --accent-color: #61afef;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { color: #333; margin-top: 0; }

        /* 控制列樣式 */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }
        button.secondary { background-color: #56b6c2; }
        button.download { background-color: #98c379; }

        input[type="text"] {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        /* 編輯器容器 */
        .editor-container {
            display: flex;
            background-color: var(--editor-bg);
            border-radius: 4px;
            overflow: hidden;
            height: 500px; /* 固定高度 */
            position: relative;
        }

        /* 行號列 */
        .line-numbers {
            width: 40px;
            padding: 10px 5px;
            background-color: var(--line-num-bg);
            color: #5c6370;
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            user-select: none;
            overflow: hidden;
        }

        /* 文本輸入框 */
        textarea {
            flex-grow: 1;
            background: transparent;
            color: var(--text-color);
            border: none;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            white-space: pre;
            overflow: auto;
        }

        .footer-tools {
            margin-top: 15px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ 程式碼格式化工具</h2>

    <div class="toolbar">
        <button onclick="pasteFromClipboard()">📋 一鍵貼上</button>
        <input type="file" id="fileInput" style="display:none" onchange="handleFile(this.files)">
        <button class="secondary" onclick="document.getElementById('fileInput').click()">📁 上傳檔案</button>
        <input type="text" id="urlInput" placeholder="輸入檔案網址 (URL)...">
        <button class="secondary" onclick="fetchFromUrl()">🌐 抓取網址</button>
    </div>

    <div class="editor-container">
        <div id="lineNumbers" class="line-numbers">1</div>
        <textarea id="codeInput" spellcheck="false" placeholder="在此輸入或貼上程式碼..." oninput="updateEditor()" onscroll="syncScroll()"></textarea>
    </div>

    <div class="footer-tools">
        <button onclick="formatCode()">🚀 開始對齊 (Format)</button>
        <button class="secondary" onclick="copyCode()">✂️ 一鍵複製</button>
        <button class="download" onclick="downloadCode()">💾 下載檔案</button>
    </div>
</div>

<script>
    const codeInput = document.getElementById('codeInput');
    const lineNumbers = document.getElementById('lineNumbers');

    // 1. 更新行號
    function updateLineNumbers() {
        const lines = codeInput.value.split('\n').length;
        let lineNumsHtml = '';
        for (let i = 1; i <= lines; i++) {
            lineNumsHtml += i + '<br>';
        }
        lineNumbers.innerHTML = lineNumsHtml;
    }

    // 2. 同步捲動
    function syncScroll() {
        lineNumbers.scrollTop = codeInput.scrollTop;
    }

    // 3. 內容變動時觸發
    function updateEditor() {
        updateLineNumbers();
    }

    // 4. 一鍵貼上
    async function pasteFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            codeInput.value = text;
            updateEditor();
        } catch (err) {
            alert('無法讀取剪貼簿，請手動貼上。');
        }
    }

    // 5. 格式化功能
    function formatCode() {
        const content = codeInput.value;
        if (!content.trim()) return;

        // 簡單判斷類型 (預設使用 JS 美化)
        const options = { indent_size: 4, space_in_empty_paren: true };
        
        // 使用 js-beautify 處理
        // 這裡會嘗試用 html/css/js 美化器
        let formatted = "";
        if (content.trim().startsWith('<')) {
            formatted = html_beautify(content, options);
        } else {
            formatted = js_beautify(content, options);
        }
        
        codeInput.value = formatted;
        updateEditor();
    }

    // 6. 一鍵複製
    function copyCode() {
        codeInput.select();
        document.execCommand('copy');
        alert('程式碼已複製到剪貼簿！');
    }

    // 7. 下載檔案
    function downloadCode() {
        const text = codeInput.value;
        const blob = new Blob([text], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = "formatted_code.txt";
        anchor.href = window.URL.createObjectURL(blob);
        anchor.click();
    }

    // 8. 處理檔案上傳
    function handleFile(files) {
        const file = files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            codeInput.value = e.target.result;
            updateEditor();
        };
        reader.readAsText(file);
    }

    // 9. 從網址獲取
    async function fetchFromUrl() {
        const url = document.getElementById('urlInput').value;
        if (!url) return alert('請輸入網址');
        
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('網路回應不正確');
            const text = await response.text();
            codeInput.value = text;
            updateEditor();
        } catch (err) {
            alert('抓取失敗 (可能是 CORS 跨域限制): ' + err.message);
        }
    }

    // 初始化行號
    updateLineNumbers();
</script>

</body>
</html>
